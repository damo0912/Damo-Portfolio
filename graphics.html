<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphics Designing & Damodar Ghimire</title>

<style>

/* ================= ORIGINAL STYLE (KEPT) ================= */

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 30px;
}

.project-card {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
}

.project-card img {
  width: 100%;
  display: block;
  cursor: pointer;
}

/* ================= LIGHTBOX ================= */

#lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 1000;
}

.image-container {
  position: relative;
}

.image-container img {
  max-width: 90vw;
  max-height: 80vh;
  border-radius: 10px;
}

#prevBtn, #nextBtn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: #fff;
  color: #000;
  border: none;
  padding: 10px;
  cursor: pointer;
}

#prevBtn { left: -60px; }
#nextBtn { right: -60px; }

#close {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 35px;
  cursor: pointer;
}

/* download */
.download-btn {
  margin-top: 15px;
  padding: 10px 20px;
  background: gold;
  color: #000;
  border-radius: 6px;
  text-decoration: none;
  font-weight: bold;
}

/* ================= WIKI POPUP ================= */

#wikiModal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.wiki-content {
  background: #111;
  padding: 20px;
  max-width: 400px;
  text-align: center;
  border-radius: 10px;
}

#wikiImg {
  width: 120px;
  border-radius: 10px;
}

#wikiClose {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 30px;
  cursor: pointer;
}

/* clickable name */
.wiki-name {
  color: gold;
  cursor: pointer;
}
.wiki-name:hover {
  text-decoration: underline;
}

</style>
</head>

<body>

<h2 style="text-align:center;padding:20px;">Graphics Designing</h2>

<!-- ================= ORIGINAL GRID (UNCHANGED) ================= -->
<div class="projects">

<div class="project-card"><img src="DSA.png"></div>
<div class="project-card"><img src="gulshan jha.png"></div>
<div class="project-card"><img src="kohli.png"></div>
<div class="project-card"><img src="lokesh bam.png"></div>
<div class="project-card"><img src="ROHIT.png"></div>
<div class="project-card"><img src="sandy.png"></div>

<div class="project-card"><img src="viraaat.png"></div>
<div class="project-card"><img src="RKO.png"></div>
<div class="project-card"><img src="burger ad.png"></div>
<div class="project-card"><img src="Devils .png"></div>
<div class="project-card"><img src="Gaming Headset.png"></div>
<div class="project-card"><img src="haland.png"></div>
<div class="project-card"><img src="sunglasses.png"></div>
<div class="project-card"><img src="Williamson.png"></div>
<div class="project-card"><img src="PIZZA.png"></div>
<div class="project-card"><img src="dipendra singh airee.png"></div>
<div class="project-card"><img src="Redbull.png"></div>

</div>

<!-- ================= LIGHTBOX ================= -->
<div id="lightbox">

<span id="close">&times;</span>

<div class="image-container">
  <button id="prevBtn">⬅</button>
  <img src="">
  <button id="nextBtn">➡</button>
</div>

<p id="caption"></p>
<a id="downloadBtn" class="download-btn" download>Download Image</a>

</div>

<!-- ================= WIKI POPUP ================= -->
<div id="wikiModal">
  <div class="wiki-content">
    <span id="wikiClose">&times;</span>
    <img id="wikiImg">
    <h2 id="wikiTitle"></h2>
    <p id="wikiText"></p>
    <a id="wikiLink" target="_blank">Read more</a>
  </div>
</div>

<script>

/* ================= CORE ================= */

const images = document.querySelectorAll('.project-card img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');
const caption = document.getElementById('caption');
const downloadBtn = document.getElementById('downloadBtn');

let index = 0;
const arr = [...images];

/* ================= CAPTIONS (FIXED + CLEAN) ================= */

const captions = {
"DSA.png":"<span class='wiki-name'>Dipendra Singh Airee</span>",
"gulshan jha.png":"<span class='wiki-name'>Gulshan Jha</span>",
"kohli.png":"<span class='wiki-name'>Virat Kohli</span>",
"lokesh bam.png":"<span class='wiki-name'>Lokesh Bam</span>",
"ROHIT.png":"<span class='wiki-name'>Rohit Paudel</span>",
"sandy.png":"<span class='wiki-name'>Sandeep Lamichhane</span>",

"viraaat.png":"<span class='wiki-name'>Virat Kohli</span>",
"RKO.png":"<span class='wiki-name'>Randy Orton</span>",
"burger ad.png":"Burger Advertisement",
"Devils .png":"Devils Noodles Poster",
"Gaming Headset.png":"Gaming Product",
"haland.png":"<span class='wiki-name'>Erling Haaland</span>",
"sunglasses.png":"Sunglasses Poster",
"Williamson.png":"<span class='wiki-name'>Kane Williamson</span>",
"PIZZA.png":"Pizza Ad",
"dipendra singh airee.png":"<span class='wiki-name'>Dipendra Singh Airee</span>",
"Redbull.png":"Red Bull Poster"
};

/* ================= LIGHTBOX ================= */

function openBox(i){
index = i;
const img = arr[index];

lightbox.style.display = "flex";
lightboxImg.src = img.src;

const file = img.src.split('/').pop();
caption.innerHTML = captions[file] || "No caption";

downloadBtn.href = img.src;
downloadBtn.setAttribute("download", file);
}

arr.forEach((img,i)=>{
img.onclick = ()=>openBox(i);
});

/* nav */
document.getElementById("nextBtn").onclick = ()=>{
index = (index+1)%arr.length;
openBox(index);
};

document.getElementById("prevBtn").onclick = ()=>{
index = (index-1+arr.length)%arr.length;
openBox(index);
};

/* close */
document.getElementById("close").onclick = ()=>{
lightbox.style.display = "none";
};

/* ================= WIKI API ================= */

const wikiModal = document.getElementById("wikiModal");
const wikiTitle = document.getElementById("wikiTitle");
const wikiText = document.getElementById("wikiText");
const wikiImg = document.getElementById("wikiImg");
const wikiLink = document.getElementById("wikiLink");

async function fetchWiki(name){
const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`);
const data = await res.json();

wikiTitle.textContent = data.title;
wikiText.textContent = data.extract || "No info available";

if(data.thumbnail){
wikiImg.src = data.thumbnail.source;
}else{
wikiImg.style.display = "none";
}

wikiLink.href = data.content_urls.desktop.page;
wikiModal.style.display = "flex";
}

/* click name */
document.addEventListener("click",(e)=>{
if(e.target.classList.contains("wiki-name")){
fetchWiki(e.target.textContent);
}
});

/* close wiki */
document.getElementById("wikiClose").onclick = ()=>{
wikiModal.style.display = "none";
};

wikiModal.onclick = (e)=>{
if(e.target === wikiModal) wikiModal.style.display = "none";
};

</script>

</body>
</html>
