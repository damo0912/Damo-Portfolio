<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphics Designing & Damodar Ghimire</title>

<style>

/* GENERAL */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
}

/* GRID */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  padding: 30px;
}

.project-card {
  cursor: pointer;
  border-radius: 10px;
  overflow: hidden;
}

.project-card img {
  width: 100%;
  display: block;
}

/* LIGHTBOX */
#lightbox {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.image-container {
  position: relative;
}

.image-container img {
  max-width: 90vw;
  max-height: 80vh;
}

/* NAV BUTTONS */
#prevBtn, #nextBtn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: white;
  color: black;
  border: none;
  padding: 10px;
  cursor: pointer;
}

#prevBtn { left: -60px; }
#nextBtn { right: -60px; }

#close {
  position: absolute;
  top:20px;
  right:30px;
  font-size: 35px;
  cursor:pointer;
}

/* DOWNLOAD */
.download-btn {
  margin-top: 15px;
  padding: 10px 20px;
  background: gold;
  color: black;
  font-weight: bold;
  border-radius: 6px;
  text-decoration: none;
}

</style>
</head>

<body>

<h2 style="text-align:center">Graphics Designing</h2>

<!-- PROJECTS -->
<div class="projects">
<div class="project-card"><img src="MAMA.png"></div>
<div class="project-card"><img src="DSA.png"></div>
<div class="project-card"><img src="gulshan jha.png"></div>
<div class="project-card"><img src="kohli.png"></div>
<div class="project-card"><img src="lokesh bam.png"></div>
<div class="project-card"><img src="ROHIT.png"></div>
<div class="project-card"><img src="sandy.png"></div>

<div class="project-card"><img src="viraaat.png"></div>
<div class="project-card"><img src="RKO"></div>
<div class="project-card"><img src="burger ad.png"></div>
<div class="project-card"><img src="Devils .png"></div>
<div class="project-card"><img src="Gaming Headset.png"></div>
<div class="project-card"><img src="haland.png"></div>
<div class="project-card"><img src="sunglasses.png"></div>
<div class="project-card"><img src="Williamson.png"></div>
<div class="project-card"><img src="PIZZA.png"></div>
<div class="project-card"><img src="dipendra singh airee.png"></div>
<div class="project-card"><img src="Redbull.png"></div>
<div class="project-card"><img src="JASPRIT BUMRAH.png"></div>
<div class="project-card"><img src="Womens day poster.png"></div>
<div class="project-card"><img src="Election-Poster.png"></div>
<div class="project-card"><img src="Trio-Poster.png"></div>
<div class="project-card"><img src="Happy Holi.png"></div>
<div class="project-card"><img src="Balen as a pm.png"></div>
<div class="project-card"><img src="honey.png"></div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox">

<span id="close">&times;</span>

<div class="image-container">
  <button id="prevBtn">⬅</button>
  <img src="">
  <button id="nextBtn">➡</button>
</div>

<p id="lightbox-caption"></p>
<p id="lightbox-info"></p>

<a id="downloadBtn" class="download-btn" download>Download Image</a>

</div>

<script>

const images = document.querySelectorAll('.project-card img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');
const caption = document.getElementById('lightbox-caption');
const info = document.getElementById('lightbox-info');
const downloadBtn = document.getElementById('downloadBtn');

const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');
const closeBtn = document.getElementById('close');

const captions = {
  "viraaat.png": "Virat Kohli Poster",
  "RKO.png": "Randy Orton Edit",
  "burger ad.png": "Burger Ad",
  "Devils .png": "Devils Poster",
  "Gaming Headset.png": "Gaming Headset",
  "haland.png": "Haaland Poster"
};

const imgArray = Array.from(images);
let index = 0;

function openLightbox(i){
  index = i;
  const img = imgArray[index];

  lightbox.style.display = "flex";
  lightboxImg.src = img.src;

  const file = img.src.split('/').pop();

  caption.textContent = captions[file] || "No caption";
  info.textContent = `Image ${index+1} / ${imgArray.length}`;

  downloadBtn.href = img.src;
  downloadBtn.setAttribute("download", file);
}

images.forEach((img,i)=>{
  img.addEventListener("click",()=>openLightbox(i));
});

function next(){
  index = (index+1)%imgArray.length;
  openLightbox(index);
}

function prev(){
  index = (index-1+imgArray.length)%imgArray.length;
  openLightbox(index);
}

nextBtn.onclick = next;
prevBtn.onclick = prev;

closeBtn.onclick = ()=> lightbox.style.display="none";

lightbox.addEventListener("click",(e)=>{
  if(e.target===lightbox) lightbox.style.display="none";
});

document.addEventListener("keydown",(e)=>{
  if(lightbox.style.display==="flex"){
    if(e.key==="ArrowRight") next();
    if(e.key==="ArrowLeft") prev();
    if(e.key==="Escape") lightbox.style.display="none";
  }
});

</script>

</body>
</html>
