<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphics Designing &  Damodar Ghimire</title>

<style>
/* GENERAL STYLES */const projectImages = document.querySelectorAll('.project-card img');

const lightbox = document.getElementById('lightbox');
const lightboxImage = lightbox.querySelector('img');
const lightboxCaption = document.getElementById('lightbox-caption');
const lightboxInfo = document.getElementById('lightbox-info');

const closeBtn = document.getElementById('close');
const nextBtn = document.getElementById('nextBtn');
const prevBtn = document.getElementById('prevBtn');

let currentIndex = 0;

// ✅ CLEAN CAPTIONS (SAFE KEYS = USE FILE NAMES EXACTLY)
const captions = {
  "viraaat.png": "Virat Kohli Poster - Cricket Legend Edit",
  "RKO.png": "Randy Orton RKO Moment Edit",
  "burger ad.png": "Burger Advertisement Poster",
  "Devils .png": "Devils Poster - Creative Art Design",

  "Gaming Headset.png": "Gaming Headset Poster",
  "haland.png": "Erling Haaland Football Edit",
  "sunglasses.png": "Sunglasses Product Ad",
  "Williamson.png": "Kane Williamson Poster",

  "PIZZA.png": "Pizza Advertisement Poster",
  "dipendra singh airee.png": "Dipendra Singh Airee Cricket Poster",
  "Redbull.png": "Red Bull Energy Poster",
  "JASPRIT  BUMRAH.png": "Jasprit Bumrah Bowling Poster",

  "Womens day poster.png": "Women's Day Poster",
  "Election-Poster.png": "Election Campaign Poster",
  "Trio-Poster.png": "Trio Creative Poster",
  "Happy Holi.png": "Holi Festival Poster",

  "Balen as a pm.png": "Balen Shah as PM Concept",
  "honey.png": "Honey Product Poster"
};

// Convert NodeList to Array
const imagesArray = Array.from(projectImages);

// 🔥 OPEN LIGHTBOX FUNCTION
function openLightbox(index) {
  currentIndex = index;
  const img = imagesArray[currentIndex];

  lightbox.style.display = "flex";
  lightboxImage.src = img.src;

  const fileName = img.getAttribute("src").split("/").pop();

  lightboxCaption.textContent =
    captions[fileName] || "No caption available";

  lightboxInfo.textContent =
    `Image ${currentIndex + 1} / ${imagesArray.length}`;
}

// CLICK IMAGE
imagesArray.forEach((img, index) => {
  img.addEventListener("click", () => {
    openLightbox(index);
  });
});

// NEXT
nextBtn.addEventListener("click", () => {
  currentIndex = (currentIndex + 1) % imagesArray.length;
  openLightbox(currentIndex);
});

// PREV
prevBtn.addEventListener("click", () => {
  currentIndex =
    (currentIndex - 1 + imagesArray.length) % imagesArray.length;
  openLightbox(currentIndex);
});

// CLOSE
function closeLightbox() {
  lightbox.style.display = "none";
  lightboxImage.src = "";
}

closeBtn.addEventListener("click", closeLightbox);

lightbox.addEventListener("click", (e) => {
  if (e.target === lightbox) closeLightbox();
});

// KEYBOARD CONTROL
document.addEventListener("keydown", (e) => {
  if (lightbox.style.display === "flex") {
    if (e.key === "ArrowRight") nextBtn.click();
    if (e.key === "ArrowLeft") prevBtn.click();
    if (e.key === "Escape") closeLightbox();
  }
});
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: #000;
  color: #fff;
  line-height: 1.6;
}

a {
  text-decoration: none;
  color: inherit;
}

.text-center {
  text-align: center;
}

/* NAVBAR */
.navbar {
  background-color: #0a0a0a;
  padding: 15px 20px;
  border-bottom: 1px solid #222;
}

.navbar .navbar-brand {
  font-size: 1.8rem;
  font-weight: bold;
  color: white;
}

/* HEADER */
header.section-header {
  text-align: center;
  padding: 60px 20px 30px;
  font-size: 2.5rem;
  font-weight: bold;
}

/* PROJECT GRID */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 40px 20px;
  max-width: 1400px;
  margin: 0 auto;
}

.project-card {
  position: relative;
  cursor: pointer;
  border-radius: 15px;
  overflow: hidden;
  border: 1px solid #333;
  transition: transform 0.3s, box-shadow 0.3s;
}

.project-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 15px;
  transition: transform 0.4s ease;
}

.project-card:hover {
  transform: scale(1.05);
  box-shadow: 0 15px 30px rgba(255,255,255,0.1);
}

/* LIGHTBOX */
#lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 20px;
  z-index: 1000;
}

.lightbox-content {
  text-align: center;
  max-width: 90%;
  max-height: 90%;
}

.image-container {
  position: relative;
  display: inline-block;
}

.image-container img {
  max-width: 100%;
  max-height: 80vh;
  border-radius: 10px;
  display: block;
}

/* Watermark only in lightbox */
.image-container .watermark {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-25deg);
  color: rgba(255,255,255,0.3);
  font-size: 40px;
  font-weight: bold;
  text-align: center;
  pointer-events: none;
  opacity: 1;
}

#lightbox span {
  position: absolute;
  top: 20px;
  right: 40px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}

#lightbox-caption {
  color: #fff;
  font-size: 1.2rem;
  line-height: 1.4;
  margin-bottom: 5px;
}

#lightbox-designer {
  color: #FFD700;
  font-size: 1.1rem;
  margin-top: 0px;
  font-style: italic;
  font-weight: 500;
  text-shadow: 1px 1px 5px rgba(0,0,0,0.7);
  text-align: center;
}

/* COMING SOON */
.coming-soon {
  font-size: 1.5rem;
  color: #aaa;
  padding: 20px;
}

/* FOOTER */
.footer {
  padding: 30px 20px;
  border-top: 1px solid #222;
  font-size: 0.95rem;
  color: #aaa;
}

/* Responsive */
@media(max-width:768px){
  header.section-header { font-size: 2rem; padding: 50px 15px 25px; }
  .projects { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); padding: 30px 15px; gap: 20px; }
  .coming-soon { font-size: 1.3rem; }
}

@media(max-width:480px){
  header.section-header { font-size: 1.5rem; padding: 40px 10px 20px; }
  .projects { grid-template-columns: 1fr; padding: 20px 10px; gap: 15px; }
  .coming-soon { font-size: 1.1rem; }
}
</style>
</head>
<body>

<script>
const projectImages = document.querySelectorAll('.project-card img');
const lightbox = document.getElementById('lightbox');
const lightboxImage = lightbox.querySelector('.image-container img');
const lightboxCaption = document.getElementById('lightbox-caption');
const closeBtn = document.getElementById('close');

// 👉 NEW: index display (add this element in HTML if not added)
let infoBox = document.getElementById('lightbox-info');

if (!infoBox) {
  infoBox = document.createElement('p');
  infoBox.id = "lightbox-info";
  infoBox.style.color = "#aaa";
  infoBox.style.fontSize = "14px";
  infoBox.style.marginTop = "5px";
  document.querySelector('.lightbox-content').appendChild(infoBox);
}

// Captions (unchanged)
const captions = {
const captions = {
  "viraaat.png": "Virat Kohli Poster - Cricket Legend Edit",
  "RKO": "Randy Orton Edit",
  "burger ad.png": "Burger Advertisement Poster - Food Marketing Design",
  "Devils .png": "Devils Poster - Dark Creative Art Design",

  "Gaming Headset.png": "Gaming Headset Poster - Tech Advertisement Design",
  "haland.png": "Erling Haaland Poster - Football Star Edit",
  "sunglasses.png": "Sunglasses Product Ad - Stylish Fashion Poster",
  "Williamson.png": "Kane Williamson Poster - Cricket Player Design",

  "PIZZA.png": "Pizza Advertisement Poster - Food Branding Design",
  "dipendra singh airee.png": "Dipendra Singh Airee Poster - Cricket Highlight Edit",
  "Redbull.png": "Red Bull Poster - Energy Drink Action Design",
  "JASPRIT  BUMRAH.png": "Jasprit Bumrah Poster - Cricket Bowling Star",

  "Womens day poster.png": "Women's Day Poster - Celebration Design",
  "Election-Poster.png": "Election Campaign Poster - Political Design",
  "Trio-Poster.png": "Trio Poster - Creative Group Design",
  "Happy Holi.png": "Happy Holi Poster - Festival of Colors Design",

  "Balen as a pm.png": "Balen Shah as PM Concept Poster - Political Vision Edit",
  "honey.png": "Honey Product Poster - Natural Sweet Branding"
};

// Convert NodeList to array
const imagesArray = Array.from(projectImages);
let currentIndex = 0;

// 👉 Open lightbox
function openLightbox(index) {
  currentIndex = index;
  const img = imagesArray[currentIndex];

  lightbox.style.display = 'flex';
  lightboxImage.src = img.src;

  const fileName = img.getAttribute('src').split('/').pop();
  lightboxCaption.textContent = captions[fileName] || "No description available";

  // 👉 NEW: image info
  infoBox.textContent = `Image ${currentIndex + 1} / ${imagesArray.length}`;
}

// Click image
imagesArray.forEach((img, index) => {
  img.addEventListener('click', () => {
    openLightbox(index);
  });
});

// 👉 Next image
function nextImage() {
  currentIndex = (currentIndex + 1) % imagesArray.length;
  openLightbox(currentIndex);
}

// 👉 Prev image
function prevImage() {
  currentIndex = (currentIndex - 1 + imagesArray.length) % imagesArray.length;
  openLightbox(currentIndex);
}

// 👉 Keyboard support (PRO feature)
document.addEventListener('keydown', (e) => {
  if (lightbox.style.display === 'flex') {
    if (e.key === 'ArrowRight') nextImage();
    if (e.key === 'ArrowLeft') prevImage();
    if (e.key === 'Escape') closeLightbox();
  }
});

// Close function
function closeLightbox() {
  lightbox.style.display = 'none';
  lightboxImage.src = '';
  lightboxCaption.textContent = '';
  infoBox.textContent = '';
}

// Close button
closeBtn.addEventListener('click', closeLightbox);

// Click outside
lightbox.addEventListener('click', e => {
  if (e.target === lightbox) closeLightbox();
});
</script>
