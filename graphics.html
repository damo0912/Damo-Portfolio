<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphics Designing | Damodar Ghimire</title>
<style>
    /* GENERAL STYLES */
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: #000;
  color: #fff;
  line-height: 1.6;
}

a {
  text-decoration: none;
  color: inherit;
}

.text-center {
  text-align: center;
}

/* NAVBAR */
.navbar {
  background-color: #0a0a0a;
  padding: 15px 20px;
  border-bottom: 1px solid #222;
}

.navbar .navbar-brand {
  font-size: 1.8rem;
  font-weight: bold;
  color: white;
}

/* HEADER */
header.section-header {
  text-align: center;
  padding: 60px 20px 30px;
  font-size: 2.5rem;
  font-weight: bold;
}

@media(max-width:768px){
  header.section-header {
    font-size: 2rem;
    padding: 50px 15px 25px;
  }
}

@media(max-width:480px){
  header.section-header {
    font-size: 1.5rem;
    padding: 40px 10px 20px;
  }
}

/* PROJECT GRID */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 40px 20px;
  max-width: 1400px;
  margin: 0 auto;
}

.project-card {
  position: relative;
  cursor: pointer;
  border-radius: 15px;
  overflow: hidden;
  border: 1px solid #333;
  transition: transform 0.3s, box-shadow 0.3s;
}

.project-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 15px;
  transition: transform 0.4s ease;
}

.project-card:hover {
  transform: scale(1.05);
  box-shadow: 0 15px 30px rgba(255,255,255,0.1);
}

/* COMING SOON */
.coming-soon {
  font-size: 1.5rem;
  color: #aaa;
  padding: 20px;
}

@media(max-width:768px){
  .projects {
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    padding: 30px 15px;
    gap: 20px;
  }
  .coming-soon {
    font-size: 1.3rem;
  }
}

@media(max-width:480px){
  .projects {
    grid-template-columns: 1fr;
    padding: 20px 10px;
    gap: 15px;
  }
  .coming-soon {
    font-size: 1.1rem;
  }
}

/* LIGHTBOX */
#lightbox {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

#lightbox img {
  max-width: 90%;
  max-height: 80%;
  border-radius: 10px;
}

#lightbox span {
  position: absolute;
  top: 20px;
  right: 40px;
  font-size: 40px;
  color: white;
  cursor: pointer;
}

/* FOOTER */
.footer {
  padding: 30px 20px;
  border-top: 1px solid #222;
  font-size: 0.95rem;
  color: #aaa;
}                       
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="index.html">Damodar Ghimire</a>
  </div>
</nav>

<!-- HEADER -->
<header class="section-header">
  <h1>Graphics Designing</h1>
</header>

<!-- PROJECTS GRID -->
<section class="projects">
  <div class="project-card"><img src="Devils .png" alt="Project 1"></div>
  <div class="project-card"><img src="PIZZA.png" alt="Project 2"></div>
  <div class="project-card"><img src="Redbull.png" alt="Project 3"></div>
  <div class="project-card"><img src="Womens day poster.png" alt="Project 4"></div>
  <div class="project-card"><img src="Election-Poster - Copy.png" alt="Project 5"></div>
  <div class="project-card"><img src="Trio-Poster - Copy.png" alt="Project 6"></div>
  <div class="project-card"><img src="JASPRIT  BUMRAH.png" alt="Project 7"></div>
  <div class="project-card"><img src="Happy Holi.png" alt="Project 8"></div>
  <div class="project-card"><img src="Balen as a pm.png" alt="Project 9"></div>
</section>

<!-- COMING SOON -->
<section class="coming-soon text-center">
  <h2>“Fresh projects arriving soon — don’t miss out!”</h2>
</section>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span id="close">&times;</span>
  <img src="" alt="Big Image">
</div>

<!-- FOOTER -->
<footer class="footer text-center">
  <p>&copy; 2026 Damodar Ghimire. All Rights Reserved.</p>
</footer>

<script src="graphics.js"></script>
</body>
</html>
